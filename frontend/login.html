<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card p-4 shadow">

<h3 class="text-center mb-3">Login</h3>

<input id="username" class="form-control mb-3" placeholder="Username">

<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn btn-primary w-100">
Login
</button>

</div>

</div>

</div>

</div>

<script src="config.js"></script>

<script>

async function login(){
try {

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

const formData = new URLSearchParams();

formData.append("username", username);
formData.append("password", password);

const loginUrl = `${window.APP_CONFIG.getApiBase()}/login`;
const res = await fetch(loginUrl,{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body: formData

});

const contentType = res.headers.get("content-type") || "";
const rawBody = await res.text();

let data = null;
if (rawBody && contentType.includes("application/json")) {
data = JSON.parse(rawBody);
}

if(!res.ok){
const message = data?.detail || rawBody || `Login failed with status ${res.status}`;
throw new Error(message);
}

console.log(data);
if(data && data.access_token){


localStorage.setItem("token", data.access_token);

window.location.href="index.html";

}else{

const preview = rawBody ? rawBody.slice(0, 200) : "[empty body]";
throw new Error(`Login response did not include an access token. Status: ${res.status}. Response: ${preview}`);
}
} catch (error) {
console.error("Login error:", error);
alert(`Login failed: ${error.message}`);
}
}

</script>

</body>

</html>
