<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Management Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Student Management Dashboard</h2>

<div class="row mb-4">

<div class="col-md-4">
<div class="card p-3">
<h5>Total Students</h5>
<h2 id="totalStudents">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Average Age</h5>
<h2 id="avgAge">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 text-center">
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
Add Student
</button>
</div>
</div>

</div>

<table class="table table-bordered">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Age</th>
<th>Course</th>
<th>Action</th>
</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

<div class="modal fade" id="addModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Add Student</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input id="name" class="form-control mb-2" placeholder="Student Name">

<input id="email" type="email" class="form-control mb-2" placeholder="Email">

<input id="age" type="number" class="form-control mb-2" placeholder="Age">

<input id="course" class="form-control mb-2" placeholder="Course">

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">
Close
</button>

<button id="saveBtn" onclick="addStudent()" class="btn btn-primary">
Save Student
</button>

</div>


<button onclick="logout()" class="btn btn-danger">Logout</button>
</div>

</div>

</div>

<script type="module" src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
