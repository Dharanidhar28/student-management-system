<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Management Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Student Management Dashboard</h2>

<button onclick="logout()" class="btn btn-danger">
Logout
</button>

</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Total Students</h5>
<h2 id="totalStudents">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Average Age</h5>
<h2 id="avgAge">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 text-center">
<button class="btn btn-primary" onclick="openAddStudentModal()" data-bs-toggle="modal" data-bs-target="#addModal">
Add Student
</button>
</div>
</div>

</div>

<div class="row mb-3">

<div class="col-md-6">
<input 
type="text" 
id="searchInput" 
class="form-control" 
placeholder="🔍 Search students..."
onkeyup="searchStudents()">
</div>
<div class="col-md-3">
<select class="form-control" onchange="sortStudents(this.value)">
<option value="">Sort By</option>
<option value="name">Name</option>
<option value="age">Age</option>
<option value="course">Course</option>
</select>
</div>

</div>
<div id="loadingSpinner" class="text-center my-3" style="display:none;">

<div class="spinner-border text-primary" role="status"></div>

<p>Loading students...</p>

</div>


<table class="table table-bordered">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Age</th>
<th>Course</th>
<th>Action</th>
</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

<nav class="mt-3">

<ul class="pagination justify-content-center" id="pagination">

</ul>

</nav>

</div>



<div class="modal fade"  id="addModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Add Student</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input id="name" class="form-control mb-2" placeholder="Student Name">

<input id="email" type="email" class="form-control mb-2" placeholder="Email">

<input id="age" type="number" class="form-control mb-2" placeholder="Age">

<input id="course" class="form-control mb-2" placeholder="Course">

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">
Close
</button>

<button id="saveBtn" onclick="addStudent()" class="btn btn-primary">
Save Student
</button>

</div>


</div>

</div>

</div>

<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Edit Student</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="editStudentId">

        <div class="mb-3">
          <label>Name</label>
          <input type="text" id="editName" class="form-control">
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input type="email" id="editEmail" class="form-control">
        </div>

        <div class="mb-3">
          <label>Age</label>
          <input type="number" id="editAge" class="form-control">
        </div>

        <div class="mb-3">
          <label>Course</label>
          <input type="text" id="editCourse" class="form-control">
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>

        <button class="btn btn-primary" id="updateBtn" onclick="updateStudent()">
          Update Student
        </button>
      </div>

    </div>
  </div>
</div>


<script type="module" src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">

<div id="toastMessage" class="toast align-items-center text-bg-success border-0">

<div class="d-flex">

<div class="toast-body" id="toastBody">
Message here
</div>

<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

</div>

</div>

</div>
</body>

</html>
